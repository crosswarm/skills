# AI工单系统 Nginx 配置
# 安装: sudo cp nginx.conf /etc/nginx/sites-available/ai-ticket
# 启用: sudo ln -s /etc/nginx/sites-available/ai-ticket /etc/nginx/sites-enabled/
# 测试: sudo nginx -t
# 重载: sudo systemctl reload nginx

server {
    listen 80;
    server_name 154.8.231.122;  # 替换为您的域名或IP

    # 前端静态文件
    location / {
        root /opt/ai-ticket/APP/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:18000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Query API (问题智能分析)
    location /query {
        proxy_pass http://127.0.0.1:18000/query;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Analyze API
    location /analyze {
        proxy_pass http://127.0.0.1:18000/analyze;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 流式分析API - SSE支持（关键：禁用缓冲）
    location /api/analyze/stream {
        proxy_pass http://127.0.0.1:8000/api/analyze/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE关键配置：禁用缓冲
        proxy_buffering off;
        proxy_cache off;

        # 长连接配置（LLM生成可能较长）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 确保SSE头部正确传递
        add_header Cache-Control 'no-cache' always;
        add_header X-Accel-Buffering 'no' always;
    }

    # WebSocket支持（如需要）
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # JS/CSS 不缓存（每次重新验证，保证部署后立即生效）
    location ~* \.(js|css)$ {
        root /opt/ai-ticket/APP/frontend;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    # 图片/字体 长期缓存
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /opt/ai-ticket/APP/frontend;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # 日志
    access_log /var/log/nginx/ai-ticket.access.log;
    error_log /var/log/nginx/ai-ticket.error.log;
}
