# 功能模块标准分类（跨竞品统一 taxonomy）
# 探索方法论 — 竞品功能探索时使用 product-exploration-v2 标准流程
exploration:
  skill_path: .agent/skills/product-exploration-v2
  workflow:
    - preparation       # references/10-preparation.md
    - feature_tree      # references/20-feature-tree.md
    - deep_interaction   # references/30-deep-interaction.md
    - documentation     # references/40-documentation.md
    - kb_structuring    # references/50-kb-structuring.md
    - prototype         # references/60-prototype.md (可选,仅需原型时)

feature_taxonomy:
  - id: workflow_approval
    name: 审批流程
    description: 多级串行/并行审批、条件路由、审批意见
    search_terms:
      zh: ["审批流程", "流程审批", "审批节点", "流程引擎"]
      en: ["workflow approval", "approval process", "workflow engine"]
  - id: delegation
    name: 代理人/委托
    description: 审批委托、代理审批、临时授权
    search_terms:
      zh: ["审批委托", "代理审批", "委托授权", "代理人设置"]
      en: ["delegation", "proxy approver", "substitute approver", "approval delegation"]
  - id: form_design
    name: 表单设计器
    description: 可视化表单设计、字段配置、布局管理
    search_terms:
      zh: ["表单设计", "表单配置", "字段设置", "表单模板"]
      en: ["form design", "form builder", "form template", "field configuration"]
  - id: branch_condition
    name: 分支条件
    description: 条件路由、动态分支、规则引擎
    search_terms:
      zh: ["条件分支", "流程分支", "分支条件", "路由条件"]
      en: ["branch condition", "conditional routing", "route map", "decision node"]
  - id: notification
    name: 消息通知
    description: 邮件/短信/APP消息推送、待办提醒
    search_terms:
      zh: ["消息通知", "流程通知", "审批提醒", "待办通知"]
      en: ["notification", "workflow notification", "approval reminder", "message push"]
  - id: print_integration
    name: 打印集成
    description: 表单打印、打印模板、批量打印
    search_terms:
      zh: ["打印集成", "打印模板", "表单打印", "打印配置"]
      en: ["print integration", "print template", "form print", "print configuration"]
  - id: mobile_approval
    name: 移动审批
    description: 手机端审批、APP审批、移动办公
    search_terms:
      zh: ["移动审批", "手机审批", "移动端", "APP审批"]
      en: ["mobile approval", "mobile workflow", "app approval", "mobile office"]
  - id: api_integration
    name: API/接口集成
    description: REST API、OpenAPI、第三方系统集成
    search_terms:
      zh: ["API集成", "开放接口", "OpenAPI", "接口对接"]
      en: ["API integration", "REST API", "open API", "third-party integration"]
  - id: performance_monitor
    name: 流程监控/效能
    description: 流程进度追踪、超时预警、效能分析
    search_terms:
      zh: ["流程监控", "流程追踪", "效能分析", "超时预警"]
      en: ["process monitoring", "workflow tracking", "performance analytics", "SLA monitoring"]
  - id: signature
    name: 电子签名
    description: 电子签章、数字签名、手写签名
    search_terms:
      zh: ["电子签名", "电子签章", "数字签名", "手写签名"]
      en: ["electronic signature", "digital signature", "e-signature", "handwritten signature"]
