project: YDY
version: 1.0.0
description: Agent 命名的一级主题显示名(labels) + 高量主题二级子主题(sub_themes)。二级顺序=匹配优先级。
labels:
  I-模板-通用配置咨询: 打印模板通用配置咨询
  I-模板-字段取值/公式: 打印模板字段取值/公式
  I-模板-布局/排版: 打印模板布局排版
  I-凭证/账表打印: 凭证与账表打印
  I-套打/纸张/打印机: 套打/纸张/打印机
  I-模板-子表/表体: 子表/表体打印
  I-模板-审批历史/流程: 审批历史打印
  I-批量打印/打印助手: 批量打印与打印助手
  P-模板-通用配置咨询: 打印模板产品诉求
  P-批量打印/打印助手: 批量打印能力
  P-模板-子表/表体: 子表/表体打印能力
  P-模板-审批历史/流程: 审批历史打印能力
  R-打印预览/输出报错: 打印预览/输出报错(缺陷)
  R-模板-通用配置咨询: 模板引擎缺陷
  R-模板-布局/排版: 布局引擎缺陷
  R-套打/纸张/打印机: 套打引擎缺陷
  K-模板-通用配置咨询: 客开模板定制
  K-模板-字段取值/公式: 客开字段取值定制
  K-模板-审批历史/流程: 客开审批历史打印
sub_themes:
  I-模板-通用配置咨询:
    - {label: 字段/数据取值配置, keywords: [取值, 带出, 字段, 数据集, 取数, 特征]}
    - {label: 布局/样式设置, keywords: [布局, 样式, 格式, 对齐, 网格, 间距]}
    - {label: 打印范围/条件设置, keywords: [打印范围, 条件, 筛选, 只打印, 分页]}
    - {label: 模板绑定/分配, keywords: [绑定, 分配, 关联, 设置打印模, 套用]}
  I-模板-字段取值/公式:
    - {label: 公式取值/调试, keywords: [公式, 调试, 公式转换, 取值公式]}
    - {label: 子表/父实体取数, keywords: [子实体, 父实体, 子表, 表体, 明细行]}
    - {label: 特征/自定义字段, keywords: [特征字段, 自定义, 枚举, 参照]}
    - {label: 带不出/取不到值, keywords: [带不出, 取不到, 不显示, 显示不, 带不出来]}
  I-模板-布局/排版:
    - {label: 间距/边距/分页, keywords: [间距, 边距, 分页, 页边距, 换行]}
    - {label: 空行/错列/对齐, keywords: [空行, 错列, 对齐, 列宽, 排列]}
    - {label: 网格/列表布局, keywords: [网格, 列表, 布局, 表格, 表体]}
  I-凭证/账表打印:
    - {label: 凭证套打/矩阵, keywords: [凭证, 套打, 矩阵, 一张凭证, 凭证打印]}
    - {label: 科目余额/明细账, keywords: [科目余额, 明细账, 辅助, 账簿, 账表]}
    - {label: 预览取不到数据, keywords: [预览不出, 显示不, 空白, 取不到, 预览没有]}
  I-套打/纸张/打印机:
    - {label: 套打偏移/对齐, keywords: [套打, 偏移, 对齐, 套打纸, 线条]}
    - {label: 自定义纸张设置, keywords: [自定义纸张, 纸张大小, 纸张, 页边距]}
    - {label: 打印机/驱动/助手, keywords: [打印机, 驱动, 默认打印, 打印助手, 云助手]}
