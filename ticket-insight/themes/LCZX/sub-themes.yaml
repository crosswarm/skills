project: LCZX
version: 1.0.0
description: Agent 命名的一级主题显示名(labels) + 高量主题二级子主题(sub_themes)。二级顺序=匹配优先级。
labels:
  I-流程设计-分支条件: 审批流分支条件配置
  I-找人规则配置: 审批找人/选人规则配置
  I-审批人/会签设置: 审批人与会签节点设置
  I-审批矩阵配置咨询: 审批矩阵配置咨询
  I-流程发布/生效: 流程发布与生效
  I-退回/驳回配置: 退回/驳回路径配置
  I-表单/模板配置: 表单与单据模板配置
  I-流程运行报错: 流程运行时报错
  I-流程监控/查询操作: 流程监控与查询
  I-审批流运行异常: 审批流运行异常
  P-产品咨询/需求沟通: 产品能力咨询与需求
  P-流程效能分析: 流程效能分析能力
  P-审批矩阵: 审批矩阵产品能力
  P-流程设计-加签减签: 加签/减签能力
  R-流程引擎-运行时报错: 引擎运行时报错(缺陷)
  R-产品咨询/需求沟通: 引擎行为差异咨询
  R-流程仿真: 流程仿真缺陷
  R-消息待办: 消息待办缺陷
  K-接口/API对接: 流程 OpenAPI 对接
  K-客开/二开/扩展: 客开/扩展点开发
  K-工作流/审批流设计: 客开审批流设计
sub_themes:
  I-流程设计-分支条件:
    - {label: 公式与嵌套条件不生效, keywords: [公式, 表达式, 嵌套, 条件不执行, 判断条件]}
    - {label: 条件保存后丢失/不生效, keywords: [保存后, 丢失, 未保存, 不生效, 保存不]}
    - {label: 分支走向/路由错误, keywords: [走错, 走向, 路由, 分流, 分支错, 没走到]}
    - {label: 历史版本/在途流程适配, keywords: [历史版本, 在途, 旧版本, 版本不, 修改流程]}
  I-找人规则配置:
    - {label: 找不到人/选不到人, keywords: [找不到人, 选不到, 搜不到, 找不到销售, 找不到财务, 找不到审批]}
    - {label: 按岗位/角色/上级选人, keywords: [岗位, 角色, 部门负责, 直接上级, 上级, 职位]}
    - {label: 特征字段/数据源选人, keywords: [特征字段, 数据源, 业务数据, 字段选人, 常用人]}
    - {label: 兼职/多组织/重名, keywords: [兼职, 重名, 多组织, 所属组织, 组织级]}
  I-审批人/会签设置:
    - {label: 会签/或签/加签设置, keywords: [会签, 或签, 加签, 减签, 汇签]}
    - {label: 连岗/同岗审批, keywords: [连岗, 同岗, 连续同岗, 离职转交]}
    - {label: 抄送/知会/通知, keywords: [抄送, 知会, 通知, 催办]}
    - {label: 指派/转交/代理, keywords: [指派, 转交, 代理, 委派, 转办]}
  I-审批矩阵配置咨询:
    - {label: 顺序审批能力, keywords: [顺序审批, 审批顺序, 依次审批]}
    - {label: 自定义数据源作矩阵, keywords: [数据源, 自定义, 矩阵配置]}
    - {label: 矩阵规则/条件不生效, keywords: [矩阵规则, 矩阵不生效, 矩阵, 规则, 协作关系]}
  I-流程发布/生效:
    - {label: 保存后未生效, keywords: [未生效, 不生效, 保存后, 没生效, 保存不了]}
    - {label: 发布/启用失败, keywords: [发布, 启用, 发布失败, 发布按钮, 生效]}
    - {label: 版本状态不一致/残留, keywords: [版本, 旧版本, 残留, 模板版本, 状态不一致]}
